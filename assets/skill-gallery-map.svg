<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skills gallery map</title>
  <desc id="desc">A clean visual map showing how a Skill moves from need, to source check, to demo proof, to published pick.</desc>
  <rect width="960" height="680" rx="24" fill="#fbfcf8"/>
  <rect x="36" y="36" width="888" height="608" rx="20" fill="#ffffff" stroke="#dde3d8" stroke-width="2"/>
  <path d="M186 338 C290 224 410 454 524 338 S728 228 792 338" fill="none" stroke="#9bcdd9" stroke-width="10" stroke-linecap="round" opacity=".72"/>
  <path d="M186 338 C290 224 410 454 524 338 S728 228 792 338" fill="none" stroke="#24586a" stroke-width="2.2" stroke-linecap="round" opacity=".78"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(88 120)">
      <rect width="188" height="148" rx="18" fill="#f7f8f5" stroke="#dde3d8"/>
      <circle cx="36" cy="38" r="10" fill="#24586a"/>
      <text x="56" y="44" fill="#24586a" font-size="15" font-weight="800">NEED</text>
      <text x="30" y="86" fill="#161814" font-size="25" font-weight="760">What can</text>
      <text x="30" y="116" fill="#161814" font-size="25" font-weight="760">help today?</text>
    </g>

    <g transform="translate(308 356)">
      <rect width="208" height="154" rx="18" fill="#ffffff" stroke="#c8e5ee" stroke-width="2"/>
      <circle cx="36" cy="38" r="10" fill="#9bcdd9"/>
      <text x="56" y="44" fill="#24586a" font-size="15" font-weight="800">SOURCE</text>
      <text x="30" y="88" fill="#161814" font-size="25" font-weight="760">10k+ gate</text>
      <text x="30" y="120" fill="#62675f" font-size="17" font-weight="650">stars or ranked proof</text>
    </g>

    <g transform="translate(536 126)">
      <rect width="214" height="164" rx="18" fill="#f1f4ee" stroke="#dde3d8"/>
      <circle cx="38" cy="40" r="10" fill="#315947"/>
      <text x="58" y="46" fill="#315947" font-size="15" font-weight="800">DEMO</text>
      <rect x="32" y="74" width="150" height="16" rx="8" fill="#dde3d8"/>
      <rect x="32" y="104" width="118" height="16" rx="8" fill="#c8e5ee"/>
      <rect x="32" y="134" width="74" height="16" rx="8" fill="#dfe7d2"/>
    </g>

    <g transform="translate(704 384)">
      <rect width="168" height="136" rx="18" fill="#ffffff" stroke="#dde3d8"/>
      <circle cx="36" cy="38" r="10" fill="#24586a"/>
      <text x="56" y="44" fill="#24586a" font-size="15" font-weight="800">PICK</text>
      <text x="30" y="88" fill="#161814" font-size="34" font-weight="780">7</text>
      <text x="70" y="86" fill="#62675f" font-size="17" font-weight="650">published</text>
    </g>

    <g transform="translate(172 548)">
      <rect width="616" height="54" rx="27" fill="#161814"/>
      <text x="38" y="35" fill="#fbfcf8" font-size="17" font-weight="750">frontend-design</text>
      <text x="218" y="35" fill="#fbfcf8" font-size="17" font-weight="750">canvas-design</text>
      <text x="390" y="35" fill="#fbfcf8" font-size="17" font-weight="750">emil-design-eng</text>
    </g>
  </g>
</svg>
